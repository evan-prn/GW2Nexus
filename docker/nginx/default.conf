# docker/nginx/default.conf

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Fix 431 Request Header Fields Too Large ───────────────────────
    # En dev, les cookies s'accumulent (session Sanctum + Vite HMR).
    # Par défaut Nginx alloue 4×8k = 32k pour les headers — insuffisant.
    # On monte à 4×32k = 128k pour absorber les sessions larges.
    large_client_header_buffers 4 32k;
    client_header_buffer_size   4k;

    # ── Frontend React (SPA) ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Laravel ───────────────────────────────────────────────────
    location /api {
        proxy_pass         http://laravel:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Fix 431 côté proxy (buffers de réponse upstream)
        proxy_buffer_size       16k;
        proxy_buffers           4 32k;
        proxy_busy_buffers_size 64k;
    }

    # ── Sanctum CSRF cookie ───────────────────────────────────────────
    # CRITIQUE : sans ce bloc, /sanctum/csrf-cookie ne passe pas par Laravel
    location /sanctum {
        proxy_pass         http://laravel:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size       16k;
        proxy_buffers           4 32k;
        proxy_busy_buffers_size 64k;
    }

    # ── Assets statiques — cache navigateur ──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Sécurité — cacher les fichiers sensibles ──────────────────────
    location ~ /\. {
        deny all;
    }
}