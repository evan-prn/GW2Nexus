# ═══════════════════════════════════════════════════════════════════
# GW2Nexus — Configuration Nginx Production
# Emplacement : docker/nginx/prod.conf
#
# Routes :
#   /api/*     → laravel:8000  (API REST Laravel)
#   /sanctum/* → laravel:8000  (CSRF token — si utilisé un jour)
#   /*         → react:80      (SPA React)
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;              # Accepte l'IP du VPS (et tout domaine futur)
    client_max_body_size 20M;   # Pour les uploads d'avatars

    # ── API Laravel ──────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://laravel:8000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }

    # ── Sanctum (si nécessaire plus tard) ────────────────────────
    location /sanctum/ {
        proxy_pass          http://laravel:8000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Frontend React (SPA) ─────────────────────────────────────
    location / {
        proxy_pass          http://react:80;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
}