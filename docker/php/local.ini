; docker/php/local.ini

; ── Limites ──────────────────────────────────────────────────────────
upload_max_filesize  = 40M
post_max_size        = 40M
memory_limit         = 256M
max_execution_time   = 300

; ── Affichage des erreurs (dev uniquement — désactiver en prod) ───────
display_errors       = On
display_startup_errors = On
error_reporting      = E_ALL
log_errors           = On

; ── Timezone ─────────────────────────────────────────────────────────
date.timezone        = Europe/Paris

; ── Sessions (cohérence avec Sanctum SPA) ────────────────────────────
session.cookie_samesite = Lax
session.cookie_secure   = 0   ; passer à 1 en prod avec HTTPS