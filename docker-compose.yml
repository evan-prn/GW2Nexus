# GW2Nexus â€” Docker Compose
# Dev stack : Laravel 12 + React/Vite + MySQL 8 + phpMyAdmin + Mailpit
#
# PrÃ©requis :
#   - Copier .env.example â†’ .env (racine)
#   - Copier backend/.env.example â†’ backend/.env
#   - Copier frontend/.env.example â†’ frontend/.env
#
# Usage :
#   Premier dÃ©marrage : docker compose up -d --build
#   DÃ©marrage normal  : docker compose up -d
#   Logs en direct    : docker compose logs -f
#   ArrÃªt propre      : docker compose down
#   Reset complet     : docker compose down -v (supprime les volumes)
# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

services:

  # â”€â”€â”€ MySQL 8 â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Base de donnÃ©es principale de GW2Nexus
  # Accessible depuis l'hÃ´te : localhost:3307
  # Accessible depuis les containers : mysql:3306
  mysql:
    image: mysql:8.0
    container_name: gw2nexus_mysql
    restart: unless-stopped
    environment:
      # Les valeurs sont lues depuis le .env racine (jamais en dur)
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      # Volume nommÃ© : les donnÃ©es MySQL survivent aux docker compose down
      - mysql_data:/var/lib/mysql
    networks:
      - gw2nexus_network
    healthcheck:
      # VÃ©rifie que MySQL accepte les connexions avant de dÃ©marrer les autres services
      # Les services Laravel et phpMyAdmin attendent ce healthcheck (depends_on)
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s   # Laisse le temps Ã  MySQL d'initialiser son storage engine

  # â”€â”€â”€ phpMyAdmin â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Interface web de gestion MySQL â€” dev uniquement
  # Accessible : http://localhost:8080
  # Connexion automatique en root (configurÃ©e via PMA_USER/PMA_PASSWORD)
  phpmyadmin:
    image: phpmyadmin:latest   # Version fixe â€” Ã©vite les ruptures sur latest
    container_name: gw2nexus_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql             # Nom du service MySQL dans le rÃ©seau Docker
      PMA_PORT: 3306
      PMA_ARBITRARY: 1            # Permet de se connecter Ã  n'importe quel host MySQL
      #PMA_USER: root
      #PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 64M           # Taille max pour l'import de fichiers SQL
    depends_on:
      mysql:
        condition: service_healthy  # Attend que MySQL soit prÃªt
    networks:
      - gw2nexus_network

  # â”€â”€â”€ Mailpit â€” serveur mail de dev â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Capture tous les emails envoyÃ©s par Laravel (vÃ©rification email, reset passwordâ€¦)
  # sans les envoyer rÃ©ellement
  # SMTP      : localhost:1025  (configurÃ© dans backend/.env)
  # Interface : http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest   # Version majeure fixe
    container_name: gw2nexus_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP â€” Laravel envoie ses mails ici
      - "8025:8025"   # Interface web â€” visualiser les emails interceptÃ©s
    networks:
      - gw2nexus_network

  # â”€â”€â”€ Laravel 12 â€” API REST â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Backend principal : API REST versionnÃ©e (/api/v1/*)
  # Accessible directement : http://localhost:8000
  # Accessible via proxy   : http://localhost:5174/api/* (recommandÃ© pour le SPA)
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gw2nexus_laravel
    restart: unless-stopped

    # â”€â”€ Alignement uid hÃ´te/container â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Ã‰vite les problÃ¨mes de permissions sur le volume mount ./backend
    # UID/GID dÃ©finis dans le .env racine (dÃ©faut : 1000/1000)
    user: "${UID:-1000}:${GID:-1000}"

    ports:
      - "8000:8000"

    volumes:
      # Mount du code source â€” les modifications PHP sont reflÃ©tÃ©es sans rebuild
      - ./backend:/var/www/html
      # Volume nommÃ© pour vendor/ â€” Ã©vite les conflits hÃ´te/container
      # et les volumes anonymes qui s'accumulent
      - backend_vendor:/var/www/html/vendor

    # â”€â”€ Variables d'environnement â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # env_file charge toutes les variables depuis backend/.env
    # environment surcharge uniquement les valeurs spÃ©cifiques Ã  Docker
    # (les noms de service remplacent les adresses localhost)
    env_file:
      - ./backend/.env            # Toutes les variables Laravel
    environment:
      DB_HOST: mysql              # Surcharge : nom du service Docker (pas 127.0.0.1)
      MAIL_HOST: mailpit          # Surcharge : nom du service Docker (pas 127.0.0.1)

    depends_on:
      mysql:
        condition: service_healthy  # Attend que MySQL soit prÃªt avant de dÃ©marrer
      mailpit:
        condition: service_started  # Mailpit n'a pas de healthcheck â€” started suffit

    # â”€â”€ Healthcheck Laravel â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Permet au service react d'attendre que Laravel soit opÃ©rationnel
    # Endpoint /api/health dÃ©fini dans routes/api.php :
    #   Route::get('/health', fn() => response()->json(['status' => 'ok']));
    healthcheck:
      test: ["CMD-SHELL", "curl -f -4 http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # Laisse le temps aux migrations de s'exÃ©cuter

    networks:
      - gw2nexus_network

  # â”€â”€â”€ React + Vite â€” Frontend SPA â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # SPA React/TypeScript servi par le dev server Vite
  # Accessible : http://localhost:5174
  # HMR actif  : les modifications React sont reflÃ©tÃ©es instantanÃ©ment
  # Proxy Vite : /api/* et /sanctum/* â†’ http://laravel:8000
  #   â†’ mÃªme domaine (localhost:5174) â†’ pas de CSRF cross-origin
  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gw2nexus_react
    restart: unless-stopped
    ports:
      - "5174:5174"     # Dev server Vite
    volumes:
      # Mount du code source â€” Vite dÃ©tecte les changements via polling
      - ./frontend:/app
      # Volume nommÃ© pour node_modules/ â€” Ã©vite les conflits hÃ´te/container
      - frontend_node_modules:/app/node_modules
    env_file:
      - ./frontend/.env           # Variables Vite (VITE_*)
    environment:
      # Polling requis pour dÃ©tecter les changements sur volumes Docker
      # NÃ©cessaire sur Windows et Mac (inotify ne fonctionne pas sur volumes montÃ©s)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      laravel:
        condition: service_healthy  # Attend que l'API Laravel soit prÃªte
    networks:
      - gw2nexus_network

# â”€â”€â”€ Volumes nommÃ©s â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Les volumes nommÃ©s sont gÃ©rÃ©s par Docker et persistent entre les redÃ©marrages
# docker compose down -v pour les supprimer (reset complet)
volumes:
  mysql_data:             # DonnÃ©es MySQL â€” ne jamais supprimer en prod
    driver: local
  backend_vendor:         # DÃ©pendances PHP Composer installÃ©es dans le container
    driver: local
  frontend_node_modules:  # DÃ©pendances JS npm installÃ©es dans le container
    driver: local

# â”€â”€â”€ RÃ©seau interne â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# RÃ©seau bridge isolÃ© â€” les containers se joignent par leur nom de service
# Exemples :
#   laravel â†’ mysql      : mysql:3306
#   laravel â†’ mailpit    : mailpit:1025
#   react   â†’ laravel    : laravel:8000 (via proxy Vite en dev)
networks:
  gw2nexus_network:
    driver: bridge


