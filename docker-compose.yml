# ═══════════════════════════════════════════════════════════════════
# GW2Nexus — Docker Compose
# Dev stack : Laravel 11 + React/Vite + MySQL 8 + phpMyAdmin + Mailpit
#
# Prérequis :
#   - Copier .env.example → .env (racine)
#   - Copier backend/.env.example → backend/.env
#   - Copier frontend/.env.example → frontend/.env
#
# Usage :
#   Premier démarrage : docker compose up -d --build
#   Démarrage normal  : docker compose up -d
#   Logs en direct    : docker compose logs -f
#   Arrêt propre      : docker compose down
#   Reset complet     : docker compose down -v (supprime les volumes)
# ═══════════════════════════════════════════════════════════════════

services:

  # ─── MySQL 8 ──────────────────────────────────────────────────────
  # Base de données principale de GW2Nexus
  # Accessible depuis l'hôte : localhost:3306
  # Accessible depuis les containers : mysql:3306
  mysql:
    image: mysql:8.0
    container_name: gw2nexus_mysql
    restart: unless-stopped
    environment:
      # Les valeurs sont lues depuis le .env racine (jamais en dur)
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      # Volume nommé : les données MySQL survivent aux docker compose down
      - mysql_data:/var/lib/mysql
    networks:
      - gw2nexus_network
    healthcheck:
      # Vérifie que MySQL accepte les connexions avant de démarrer les autres services
      # Les services Laravel et phpMyAdmin attendent ce healthcheck (depends_on)
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s   # Laisse le temps à MySQL d'initialiser son storage engine

  # ─── phpMyAdmin ───────────────────────────────────────────────────
  # Interface web de gestion MySQL — dev uniquement
  # Accessible : http://localhost:8080
  # Connexion automatique en root (configurée via PMA_USER/PMA_PASSWORD)
  phpmyadmin:
    image: phpmyadmin:latest   # Version fixe — évite les ruptures sur latest
    container_name: gw2nexus_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql             # Nom du service MySQL dans le réseau Docker
      PMA_PORT: 3306
      PMA_ARBITRARY: 1            # Permet de se connecter à n'importe quel host MySQL
      #PMA_USER: root
      #PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 64M           # Taille max pour l'import de fichiers SQL
    depends_on:
      mysql:
        condition: service_healthy  # Attend que MySQL soit prêt
    networks:
      - gw2nexus_network

  # ─── Mailpit — serveur mail de dev ────────────────────────────────
  # Capture tous les emails envoyés par Laravel (vérification email, reset password…)
  # sans les envoyer réellement
  # SMTP      : localhost:1025  (configuré dans backend/.env)
  # Interface : http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest   # Version majeure fixe
    container_name: gw2nexus_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — Laravel envoie ses mails ici
      - "8025:8025"   # Interface web — visualiser les emails interceptés
    networks:
      - gw2nexus_network

  # ─── Laravel 11 — API REST ────────────────────────────────────────
  # Backend principal : API REST versionnée (/api/v1/*)
  # Accessible directement : http://localhost:8000
  # Accessible via proxy   : http://localhost:5173/api/* (recommandé pour le SPA)
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gw2nexus_laravel
    restart: unless-stopped

    # ── Alignement uid hôte/container ─────────────────────────────
    # Évite les problèmes de permissions sur le volume mount ./backend
    # UID/GID définis dans le .env racine (défaut : 1000/1000)
    user: "${UID:-1000}:${GID:-1000}"

    ports:
      - "8000:8000"

    volumes:
      # Mount du code source — les modifications PHP sont reflétées sans rebuild
      - ./backend:/var/www/html
      # Volume nommé pour vendor/ — évite les conflits hôte/container
      # et les volumes anonymes qui s'accumulent
      - backend_vendor:/var/www/html/vendor

    # ── Variables d'environnement ──────────────────────────────────
    # env_file charge toutes les variables depuis backend/.env
    # environment surcharge uniquement les valeurs spécifiques à Docker
    # (les noms de service remplacent les adresses localhost)
    env_file:
      - ./backend/.env            # Toutes les variables Laravel
    environment:
      DB_HOST: mysql              # Surcharge : nom du service Docker (pas 127.0.0.1)
      MAIL_HOST: mailpit          # Surcharge : nom du service Docker (pas 127.0.0.1)

    depends_on:
      mysql:
        condition: service_healthy  # Attend que MySQL soit prêt avant de démarrer
      mailpit:
        condition: service_started  # Mailpit n'a pas de healthcheck — started suffit

    # ── Healthcheck Laravel ────────────────────────────────────────
    # Permet au service react d'attendre que Laravel soit opérationnel
    # Endpoint /api/health défini dans routes/api.php :
    #   Route::get('/health', fn() => response()->json(['status' => 'ok']));
    healthcheck:
      test: ["CMD-SHELL", "curl -f -4 http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # Laisse le temps aux migrations de s'exécuter

    networks:
      - gw2nexus_network

  # ─── React + Vite — Frontend SPA ──────────────────────────────────
  # SPA React/TypeScript servi par le dev server Vite
  # Accessible : http://localhost:5173
  # HMR actif  : les modifications React sont reflétées instantanément
  # Proxy Vite : /api/* et /sanctum/* → http://laravel:8000
  #   → même domaine (localhost:5173) → pas de CSRF cross-origin
  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gw2nexus_react
    restart: unless-stopped
    ports:
      - "5173:5173"     # Dev server Vite
    volumes:
      # Mount du code source — Vite détecte les changements via polling
      - ./frontend:/app
      # Volume nommé pour node_modules/ — évite les conflits hôte/container
      - frontend_node_modules:/app/node_modules
    env_file:
      - ./frontend/.env           # Variables Vite (VITE_*)
    environment:
      # Polling requis pour détecter les changements sur volumes Docker
      # Nécessaire sur Windows et Mac (inotify ne fonctionne pas sur volumes montés)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      laravel:
        condition: service_healthy  # Attend que l'API Laravel soit prête
    networks:
      - gw2nexus_network

# ─── Volumes nommés ───────────────────────────────────────────────────
# Les volumes nommés sont gérés par Docker et persistent entre les redémarrages
# docker compose down -v pour les supprimer (reset complet)
volumes:
  mysql_data:             # Données MySQL — ne jamais supprimer en prod
    driver: local
  backend_vendor:         # Dépendances PHP Composer installées dans le container
    driver: local
  frontend_node_modules:  # Dépendances JS npm installées dans le container
    driver: local

# ─── Réseau interne ───────────────────────────────────────────────────
# Réseau bridge isolé — les containers se joignent par leur nom de service
# Exemples :
#   laravel → mysql      : mysql:3306
#   laravel → mailpit    : mailpit:1025
#   react   → laravel    : laravel:8000 (via proxy Vite en dev)
networks:
  gw2nexus_network:
    driver: bridge