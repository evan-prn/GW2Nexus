name: 🚀 GW2Nexus — CI/CD Pipeline (VPS OVH)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"

jobs:

  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Tests Backend Laravel (inchangé — déjà fonctionnel)
  # ═══════════════════════════════════════════════════════════════
  backend-tests:
    name: 🧪 Tests Backend (Laravel)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gw2nexus_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, pdo, pdo_mysql, xml, curl
          coverage: none

      - name: 📦 Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: 📦 Installation des dépendances Composer
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: ⚙️ Configuration de l'environnement de test
        working-directory: backend
        run: |
          cp .env.testing.ci .env
          php artisan key:generate

      - name: 🗄️ Migration de la base de données de test
        working-directory: backend
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: gw2nexus_test
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: ✅ Exécution des tests PHPUnit
        working-directory: backend
        run: php artisan test --parallel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: gw2nexus_test
          DB_USERNAME: root
          DB_PASSWORD: root

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Lint & Build Frontend React (inchangé)
  # ═══════════════════════════════════════════════════════════════
  frontend-build:
    name: 🎨 Build Frontend (React/Vite)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Installation des dépendances NPM
        working-directory: frontend
        run: npm ci

      - name: 🔍 Lint TypeScript / ESLint
        working-directory: frontend
        run: npm run lint

      - name: 🏗️ Build de production Vite
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ""   # Vide = Nginx gère le routing /api/* en prod

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — Déploiement VPS OVH via SSH
  # Remplace les jobs Railway + Vercel précédents
  # Déclenché uniquement sur push main après que les 2 jobs passent
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: 🖥️ Déploiement VPS OVH
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔑 Déploiement SSH sur le VPS OVH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}       # IP du VPS OVH
          username: ${{ secrets.VPS_USER }}   # Utilisateur deploy (pas root)
          key: ${{ secrets.VPS_SSH_KEY }}     # Clé SSH privée (voir README)
          port: 22
          script: bash /var/www/gw2nexus/scripts/deploy.sh